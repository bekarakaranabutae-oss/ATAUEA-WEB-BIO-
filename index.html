<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aren Rueri | Bio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f8ff;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: 0;
            padding: 20px;
        }
        .bio-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
            margin-bottom: 30px;
        }
        .bio-container h1 {
            color: #1e90ff;
            margin-bottom: 15px;
        }
        .bio-container p {
            font-size: 18px;
            line-height: 1.6;
        }
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #1e90ff;
        }
        .map-container {
            width: 100%;
            max-width: 600px;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .audio-player {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="bio-container">
        <!-- Profile Image -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/USP_Fiji_Campus_2016.jpg/320px-USP_Fiji_Campus_2016.jpg" 
             alt="Aren Rueri Profile" 
             class="profile-pic">

        <h1>Aren Rueri 🇫🇯</h1>
        <p>Hello! My name is Aren Rueri, I am from Fiji, and I study at the University of the South Pacific (USP). Welcome to my personal bio page!</p>

        <!-- Music Player -->
        <audio controls class="audio-player">
            <source src="song.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <div class="map-container">
        <!-- Google Map of USP, Fiji -->
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3932.4010618826235!2d178.4417183153032!3d-18.131852987417846!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6e11009a44444444%3A0xa41d3b94e7d9b6!2sUniversity%20of%20the%20South%20Pacific%20(USP)%2C%20Fiji!5e0!3m2!1sen!2sfj!4v1699999999999!5m2!1sen!2sfj" 
            width="100%" 
            height="100%" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>
</body>
</html>
