<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aren Rueri | Bio</title>
    <style>
        /* Google Fonts for a modern look */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
        }

        /* Glassmorphism Bio Container */
        .bio-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 600px;
            transition: transform 0.3s ease;
        }

        .bio-container:hover {
            transform: translateY(-10px);
        }

        .bio-container h1 {
            color: #00ffe7;
            font-size: 2.5rem;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #00ffe7, 0 0 20px #00ffe7;
        }

        .bio-container p {
            font-size: 18px;
            line-height: 1.6;
            color: #e0e0e0;
        }

        /* Profile Picture */
        .profile-pic {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 25px;
            border: 4px solid #00ffe7;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .profile-pic:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #00ffe7, 0 0 40px #00ffe7;
        }

        /* Audio Player */
        .audio-player {
            margin-top: 20px;
            width: 100%;
            outline: none;
        }

        /* Map Container */
        .map-container {
            width: 100%;
            max-width: 600px;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            margin-top: 30px;
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
        }

        .map-container:hover {
            transform: scale(1.02);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="bio-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/USP_Fiji_Campus_2016.jpg/320px-USP_Fiji_Campus_2016.jpg" 
             alt="Aren Rueri Profile" 
             class="profile-pic">

        <h1>Aren Rueri 🇫🇯</h1>
        <p>Hello! My name is Aren Rueri, I am from Fiji, and I study at the University of the South Pacific (USP). Welcome to my personal bio page!</p>

        <audio controls class="audio-player">
            <source src="song.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <div class="map-container">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3932.4010618826235!2d178.4417183153032!3d-18.131852987417846!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6e11009a44444444%3A0xa41d3b94e7d9b6!2sUniversity%20of%20the%20South%20Pacific%20(USP)%2C%20Fiji!5e0!3m2!1sen!2sfj!4v1699999999999!5m2!1sen!2sfj" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>
</body>
</html>
